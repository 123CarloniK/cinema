                    <button class="arena-item ${this.selectedArena?.id === arena.id ? 'active' : ''}" onclick="window.app.selectArena(${arena.id})">
                        <div class="arena-item-name">${arena.name}</div>
                        <div class="arena-item-location">📍 ${arena.locations[0]}</div>
                        <div class="arena-item-cost ${arena.cost === 'GRATUITO' ? 'free' : 'paid'}">
                            ${arena.cost === 'GRATUITO' ? '✓ Gratuito' : arena.cost}
                        </div>
                    </button>
                `).join('');
            },

            selectArena(id) {
                this.selectedArena = arenas.find(a => a.id === id);
                this.renderArenasList();
                if (this.currentView === 'list') this.renderArenaDetails();
                if (window.innerWidth < 768) this.toggleSidebar();
            },

            renderArenaDetails() {
                if (!this.selectedArena) return;
                const content = document.getElementById('contentArea');
                const isFree = this.selectedArena.cost === 'GRATUITO';
                
                content.innerHTML = `
                    <div>
                        <div class="header-box">
                            <h2>${this.selectedArena.name}</h2>
                            <p>📍 ${this.selectedArena.locations[0]}</p>
                            <p>⏰ ${this.selectedArena.time} | ${isFree ? '✓ Gratuito' : this.selectedArena.cost}</p>
                        </div>
                        
                        <div class="section">
                            <h3 onclick="this.nextElementSibling.classList.toggle('active')">📞 Contatti ▼</h3>
                            <div class="section-content active">
                                <p><strong>Email:</strong><br>${this.selectedArena.email}</p>
                                <p style="margin-top: 8px;"><strong>Tel:</strong><br>${this.selectedArena.phone}</p>
                                <p style="margin-top: 8px;"><strong>Sito:</strong><br><span style="color: #60a5fa;">${this.selectedArena.website}</span></p>
                            </div>
                        </div>
                    </div>
                `;
            },

            countFilmsForDate(selectedDate) {
                let count = 0;
                for (let arenaId in filmSchedule) {
                    if (filmSchedule[arenaId][selectedDate]) {
                        count += filmSchedule[arenaId][selectedDate].length;
                    }
                }
                return count;
            },

            setView(view) {
                this.currentView = view;
                document.querySelectorAll('.buttons button').forEach(b => b.classList.remove('active'));
                
                if (view === 'list') {
                    document.getElementById('btnList').classList.add('active');
                    this.renderArenasList();
                    this.renderArenaDetails();
                } else if (view === 'films') {
                    document.getElementById('btnFilms').classList.add('active');
                    const dateInput = document.getElementById('dateInput');
                    const filtered = this.getFilteredArenas('', dateInput.value);
                    const dateObj = new Date(dateInput.value);
                    const dateStr = dateObj.toLocaleDateString('it-IT', { weekday: 'long', month: 'long', day: 'numeric' });
                    const filmCount = this.countFilmsForDate(dateInput.value);
                    const content = document.getElementById('contentArea');
                    
                    let html = `
                        <div>
                            <div class="header-box">
                                <h2>📽️ Film Oggi</h2>
                                <p>${dateStr}</p>
                                <p>${filtered.length} arene | ${filmCount} film in programmazione</p>
                            </div>
                            <div class="films-grid">
                    `;
                    
                    filtered.forEach(arena => {
                        const arenaFilms = getFilmsByArenaAndDate(arena.id, dateInput.value);
                        
                        if (arenaFilms.length === 0) return;
                        
                        html += `
                            <div class="arena-section">
                                <div class="arena-section-header" onclick="window.app.selectArena(${arena.id})">
                                    <h3>📍 ${arena.name}</h3>
                                    <p>${arena.locations[0]} • ${arena.cost === 'GRATUITO' ? '✓ Gratuito' : arena.cost}</p>
                                </div>
                                <div>
                                    ${arenaFilms.map(film => `
                                        <div class="film-item">
                                            <div class="film-time">⏰ ${film.time}</div>
                                            <div class="film-title">🎬 ${film.title}</div>
                                            <div class="film-info">Regia: ${film.director}</div>
                                            <div class="film-genre">${film.genre} • ${film.year}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                    content.innerHTML = html;
                } else if (view === 'map') {
                    document.getElementById('btnMap').classList.add('active');
                    const content = document.getElementById('contentArea');
                    content.innerHTML = '<div id="mapId" class="map-container"></div>';
                    setTimeout(() => this.initMap(), 300);
                }
                
                if (window.innerWidth < 768) this.toggleSidebar();
            },

            initMap() {
                const mapId = document.getElementById('mapId');
                if (!this.map && mapId) {
                    try {
                        this.map = L.map(mapId).setView([41.9028, 12.4964], 11);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '© OpenStreetMap',
                            maxZoom: 19,
                        }).addTo(this.map);
                        
                        arenas.forEach((arena, idx) => {
                            L.circleMarker([arena.coords.lat, arena.coords.lng], {
                                radius: 8,
                                fillColor: '#dc2626',
                                color: '#fff',
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.8
                            }).bindPopup(`<strong>${idx + 1}. ${arena.name}</strong><br>${arena.locations[0]}`)
                             .on('click', () => this.selectArena(arena.id))
                             .addTo(this.map);
                        });
                        
                        setTimeout(() => this.map.invalidateSize(), 100);
                    } catch (e) {
                        console.error('Errore mappa:', e);
                    }
                }
            }
        };

        // EVENT LISTENERS
        document.getElementById('menuBtn').addEventListener('click', () => window.app.toggleSidebar());
        document.getElementById('closeSidebar').addEventListener('click', () => window.app.toggleSidebar());
        document.getElementById('sidebarOverlay').addEventListener('click', () => window.app.toggleSidebar());

        document.getElementById('dateInput').addEventListener('change', () => {
            window.app.renderArenasList();
            if (window.app.currentView === 'list') window.app.renderArenaDetails();
            if (window.app.currentView === 'films') window.app.setView('films');
        });

        document.getElementById('searchInput').addEventListener('input', () => window.app.renderArenasList());

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('sidebar').classList.contains('active')) {
                window.app.toggleSidebar();
            }
        });

        window.app.renderArenasList();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23dc2626' width='180' height='180'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dominant-baseline='middle'>🎬</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #111827;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }
        
        .header {
            background: linear-gradient(to right, #dc2626, #991b1b);
            padding: max(12px, env(safe-area-inset-top)) 16px 12px 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-shrink: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .header p {
            color: #fee2e2;
            font-size: 12px;
        }
        
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #1f2937;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
            padding-top: max(60px, calc(60px + env(safe-area-inset-top)));
        }
        
        .sidebar.active {
            transform: translateX(0);
        }
        
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
        }
        
        .sidebar-overlay.active {
            display: block;
        }
        
        .filters {
            background: #111827;
            border-bottom: 1px solid #374151;
            padding: 16px;
            gap: 12px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .filter-group label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        input[type="date"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #374151;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #dc2626;
        }
        
        .counter {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }
        
        .counter strong {
            color: #4ade80;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        button {
            padding: 12px 8px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #374151;
            color: #fff;
            -webkit-appearance: none;
            appearance: none;
            min-height: 44px;
        }
        
        button.active {
            background: #dc2626;
        }
        
        button:active {
            opacity: 0.7;
        }
        
        .menu-btn {
            position: fixed;
            top: max(12px, calc(12px + env(safe-area-inset-top)));
            right: 16px;
            z-index: 210;
            width: 44px;
            height: 44px;
            background: #dc2626;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .arenas-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .arena-item {
            padding: 12px;
            background: #374151;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            min-height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .arena-item:active {
            background: #4b5563;
        }
        
        .arena-item.active {
            background: #dc2626;
        }
        
        .arena-item-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 13px;
        }
        
        .arena-item-location {
            font-size: 11px;
            color: #d1d5db;
        }
        
        .arena-item-cost {
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }
        
        .arena-item-cost.free {
            color: #86efac;
        }
        
        .arena-item-cost.paid {
            color: #60a5fa;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }
        
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            background: linear-gradient(to bottom, #111827, #1f2937);
        }
        
        .content-max-width {
            max-width: 100%;
        }
        
        .header-box {
            background: linear-gradient(to right, #dc2626, #b91c1c);

            border-radius: 8px;
            margin-bottom: 16px;

        }
        
        .header-box h2 {

            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .header-box p {
            color: #fee2e2;
            font-size: 13px;
            line-height: 1.4;
            margin-top: 6px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .info-card {
            background: #374151;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .info-card-value {

            font-weight: bold;
            margin-bottom: 4px;

        }
        
        .info-card-label {

        }
        
        .section {

            border-radius: 8px;

        }
        
        .section h3 {

            margin-bottom: 8px;
            font-size: 14px;

            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 44px;
        }
        
        .section h3:active {
            opacity: 0.7;
        }
        
        .section-content {
            display: none;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .section-content.active {
            display: block;
        }
        
        .film-list {

            flex-direction: column;
            gap: 10px;
        }
        
        .film-item {
            background: #4b5563;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #dc2626;
            font-size: 13px;
        }
        
        .film-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .film-info {
            font-size: 11px;
            color: #d1d5db;
            margin-bottom: 4px;
        }
        
        .film-time {
            font-size: 13px;
            color: #fca5a5;
            font-weight: 600;
        }
        
        .amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        
        .tag {
            background: #dc2626;
            color: #fff;
            padding: 6px 10px;
            border-radius: 9999px;
            font-size: 11px;
        }
        
        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 32px 16px;
            font-size: 14px;
        }
        
        .footer {
            background: #111827;
            border-top: 1px solid #374151;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            font-size: 11px;
            color: #9ca3af;
            flex-shrink: 0;
        }
        
        .map-container {
            width: 100%;
            height: 100%;
        }
        
        .arena-films-section {
            background: #374151;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .arena-films-header {
            cursor: pointer;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #4b5563;
        }
        
        .arena-films-header h3 {
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        
        .arena-films-header p {
            font-size: 11px;
            color: #9ca3af;
            margin: 4px 0 0 0;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
        
        .close-sidebar {
            position: absolute;
            top: max(12px, calc(12px + env(safe-area-inset-top)));
            left: 16px;
            background: #dc2626;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 220;
        }
        
        @media (max-height: 600px) {
            .header {
                padding: max(8px, env(safe-area-inset-top)) 16px 8px 16px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            button {
                min-height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

            <div class="sidebar" id="sidebar">

                <!-- Filters -->
                <div class="filters">
                    <div class="filter-group">
                        <label>📅 Data</label>
                        <input type="date" id="dateInput" value="2026-07-08" min="2026-05-19" max="2026-09-30">
                        <div class="counter">Aperte: <strong id="openCount">8</strong>/14</div>
                    </div>
                    
                    <div class="filter-group">

                    <div class="buttons">

                        <button id="btnFilms" onclick="setView('films')">📽️ Film</button>
                        <button id="btnMap" onclick="setView('map')">🗺️ Mappa</button>

        <!-- Footer -->
        <div class="footer">
            🎬 Roma Cinema | 14 arene | Estate 2026
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

            { id: 3, name: "Sotto le Stelle dell'Austria", locations: ["Forum Austriaco"], coords: { lat: 41.9234, lng: 12.4856 }, period: "23 giugno - 7 luglio", startDate: "2026-06-23", endDate: "2026-07-07", cost: "GRATUITO", time: "20:30", contact: "Forum Austriaco", website: "austriacult.roma.it", description: "Cinema austriaco contemporaneo in lingua originale con sottotitoli italiani.", capacity: "80-100 persone", amenities: ["Cinema europeo", "Posti limitati"] },
            { id: 4, name: "Cortili di Cinema", locations: ["Municipio XV"], coords: { lat: 41.9356, lng: 12.4234 }, period: "13 giugno - 19 luglio", startDate: "2026-06-13", endDate: "2026-07-19", cost: "GRATUITO", time: "21:00", contact: "Comune di Roma", website: "comune.roma.it", description: "12 serate gratuite in 6 scuole di Roma Nord. Commedie e cinema civile.", capacity: "150-200 persone", amenities: ["Gratuito", "Roma Nord", "Famiglia-friendly"] },
            { id: 5, name: "Roma Cinema Arena", locations: ["Parco Acquedotti"], coords: { lat: 41.8736, lng: 12.5425 }, period: "Estate 2026", startDate: "2026-07-01", endDate: "2026-08-31", cost: "GRATUITO", time: "21:00", contact: "Fondazione Cinema", website: "romacinemaafest.it", description: "Arena nel Parco Acquedotti con archi illuminati. Classici e cinema d'autore.", capacity: "400+ persone", amenities: ["Archi illuminati", "Cinema d'autore", "Luogo iconico"] },
            { id: 6, name: "Modius Cinema Paradise", locations: ["Radisson Collection Hotel"], coords: { lat: 41.8949, lng: 12.4927 }, period: "19 maggio - 1 luglio", startDate: "2026-05-19", endDate: "2026-07-01", cost: "Da 35€", time: "20:00", contact: "Modius", website: "eventbrite.com", description: "Rooftop con vista 360° su Roma. Cocktail e finger food da grandi chef.", capacity: "150 persone", amenities: ["Vista panoramica", "Cocktail", "Chef rinomati"] },
            { id: 7, name: "Sundance Cinema Open Air", locations: ["EUR Social Park"], coords: { lat: 41.8335, lng: 12.4723 }, period: "Giugno - Settembre", startDate: "2026-06-01", endDate: "2026-09-30", cost: "GRATUITO", time: "21:00", contact: "Sundance", website: "eurpark.it", description: "Festival al verde con sdraio, street food e cocktail. Film internazionali.", capacity: "300 persone", amenities: ["EUR", "Sdraio", "Street food"] },
            { id: 8, name: "Teatro Ettore Scola", locations: ["Villa Borghese"], coords: { lat: 41.9105, lng: 12.4897 }, period: "Giugno - 6 settembre", startDate: "2026-06-01", endDate: "2026-09-06", cost: "GRATUITO", time: "21:30", contact: "Casa del Cinema", website: "casadelcinema.it", description: "Arena d'essai in Villa Borghese. Rassegne tematiche e incontri speciali.", capacity: "500 persone", amenities: ["Villa Borghese", "Cinema d'essai", "Incontri"] },
            { id: 9, name: "Cinema sul Tetto", locations: ["Casilino Sky Park"], coords: { lat: 41.8715, lng: 12.5412 }, period: "31 maggio - 12 settembre", startDate: "2026-05-31", endDate: "2026-09-12", cost: "GRATUITO", time: "21:00", contact: "Casilino Sky Park", website: "casilinoskypark.it", description: "Film 'sospeso' dalla terrazza a 18 metri. Cinema italiano contemporaneo.", capacity: "150 persone", amenities: ["Vista panoramica", "Martedì", "Periferie"] },
            { id: 10, name: "Arena Garbatella", locations: ["Parco Maurizio Arena"], coords: { lat: 41.8634, lng: 12.4723 }, period: "18 giugno - 13 settembre", startDate: "2026-06-18", endDate: "2026-09-13", cost: "Da 3,50€", time: "21:15", contact: "Arena Garbatella", website: "arenagarbatella.it", description: "Cinema di quartiere verace nel Parco. Commedie italiane e autori europei.", capacity: "200 persone", amenities: ["Quartiere", "3,50€", "Atmosfera romana"] },
            { id: 11, name: "Il Cinema alle Mura", locations: ["Parco Mura Aureliane"], coords: { lat: 41.8871, lng: 12.5187 }, period: "Giugno - Settembre", startDate: "2026-06-01", endDate: "2026-09-30", cost: "GRATUITO", time: "21:00", contact: "Comitato Mura Latine", website: "muralatine.it", description: "Cinema comunitario tra le Mura. Porta telo e cuscino, sediti sul prato.", capacity: "200 persone", amenities: ["Mura storiche", "Prato", "Comunitario"] },
            { id: 12, name: "Ciak Cinema Arena", locations: ["Teatro Ciak - Cassia"], coords: { lat: 41.9467, lng: 12.4412 }, period: "Maggio - Settembre", startDate: "2026-05-01", endDate: "2026-09-30", cost: "GRATUITO", time: "21:00", contact: "Teatro Ciak", website: "ciakarena.it", description: "Cinema gratuito con impronta sociale. Film su periferie e giovani.", capacity: "150 persone", amenities: ["Roma Nord", "Sociale", "Periferie"] },
            { id: 13, name: "CineCorviale Estate", locations: ["Centro Campanella"], coords: { lat: 41.8478, lng: 12.4156 }, period: "Settembre 2026", startDate: "2026-09-01", endDate: "2026-09-30", cost: "GRATUITO", time: "21:00", contact: "CineCorviale", website: "cinecorvialestate.it", description: "Cinema comunitario con film indipendenti e laboratori per bambini.", capacity: "150 persone", amenities: ["Settembre", "Comunitario", "Laboratori"] },
            { id: 14, name: "Il Cinema in Ascolto", locations: ["Polo Civico Aldo Ballarin"], coords: { lat: 41.9187, lng: 12.5234 }, period: "Settembre 2026", startDate: "2026-09-01", endDate: "2026-09-30", cost: "GRATUITO", time: "20:30", contact: "Il Cinema in Ascolto", website: "ilcinemainascolto.it", description: "Cinema in cuffia wireless! 14 serate con dibattiti su temi sociali.", capacity: "200 persone", amenities: ["Cuffie wireless", "Accessibile", "Dibattiti"] },
        ];

        let selectedArena = null;
        let currentView = 'list';
        let map = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function isArenaOpen(arena, dateStr) {
            const date = new Date(dateStr);
            const start = new Date(arena.startDate);
            const end = new Date(arena.endDate);
            return date >= start && date <= end;
        }

        function getFilteredArenas(searchTerm, selectedDate) {
            return arenas.filter(arena => {
                const matchesSearch = arena.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    arena.locations.some(loc => loc.toLowerCase().includes(searchTerm.toLowerCase()));
                const matchesDate = isArenaOpen(arena, selectedDate);
                return matchesSearch && matchesDate;
            });
        }

        function renderArenasList() {
            const dateInput = document.getElementById('dateInput');
            const searchInput = document.getElementById('searchInput');
            const filtered = getFilteredArenas(searchInput.value, dateInput.value);
            const openCount = arenas.filter(a => isArenaOpen(a, dateInput.value)).length;
            
            document.getElementById('openCount').textContent = openCount;
            
            const list = document.getElementById('arenasList');
            list.innerHTML = filtered.map(arena => `
                <div class="arena-item ${selectedArena?.id === arena.id ? 'active' : ''}" onclick="selectArena(${arena.id})">
                    <div class="arena-item-name">${arena.name}</div>
                    <div class="arena-item-location">📍 ${arena.locations[0]}</div>
                    <div class="arena-item-cost ${arena.cost === 'GRATUITO' ? 'free' : 'paid'}">
                        ${arena.cost === 'GRATUITO' ? '✓ Gratuito' : arena.cost}
                    </div>
                </div>
            `).join('');
        }

        function selectArena(id) {
            selectedArena = arenas.find(a => a.id === id);
            renderArenasList();
            if (currentView === 'list') renderArenaDetails();
            toggleSidebar();
        }

        function renderArenaDetails() {
            if (!selectedArena) return;
            
            const content = document.getElementById('contentArea');
            const isFree = selectedArena.cost === 'GRATUITO';
            const cost = isFree ? '✓ Gratuito' : selectedArena.cost;
            
            content.innerHTML = `
                <div class="content-max-width">
                    <div class="header-box">
                        <h2>${selectedArena.name}</h2>
                        <p>📍 ${selectedArena.locations.join(', ')}</p>
                        <p>⏰ ${selectedArena.period}</p>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-card-value" style="color: ${isFree ? '#4ade80' : '#60a5fa'}">${cost}</div>
                            <div class="info-card-label">Ingresso</div>
                        </div>
                        <div class="info-card">
                            <div class="info-card-value">${selectedArena.time}</div>
                            <div class="info-card-label">Inizio</div>
                        </div>
                        <div class="info-card">
                            <div class="info-card-value">${selectedArena.capacity}</div>
                            <div class="info-card-label">Capienza</div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3 onclick="this.nextElementSibling.classList.toggle('active')">📋 Descrizione <span>▼</span></h3>
                        <div class="section-content active">
                            <p>${selectedArena.description}</p>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3 onclick="this.nextElementSibling.classList.toggle('active')">✨ Caratteristiche <span>▼</span></h3>
                        <div class="section-content active">
                            <div class="amenities">
                                ${selectedArena.amenities.map(a => `<span class="tag">${a}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3 onclick="this.nextElementSibling.classList.toggle('active')">📞 Contatti <span>▼</span></h3>
                        <div class="section-content active">
                            <p><strong>Organizzatore:</strong><br>${selectedArena.contact}</p>
                            <p style="margin-top: 8px;"><strong>Sito:</strong><br><span style="color: #60a5fa;">${selectedArena.website}</span></p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFilmsView() {
            const dateInput = document.getElementById('dateInput');
            const filtered = getFilteredArenas('', dateInput.value);
            const dateObj = new Date(dateInput.value);
            const dateStr = dateObj.toLocaleDateString('it-IT', { weekday: 'long', month: 'short', day: 'numeric' });
            
            const content = document.getElementById('contentArea');
            let html = `
                <div class="content-max-width">
                    <div class="header-box">
                        <h2>📽️ Film Oggi</h2>
                        <p>${dateStr}</p>
                        <p>${filtered.length} arene • ${filtered.length * 2} film</p>
                    </div>
            `;
            
            filtered.forEach(arena => {
                html += `
                    <div class="arena-films-section">
                        <div class="arena-films-header" onclick="selectArena(${arena.id})">
                            <h3>📍 ${arena.name}</h3>
                            <p>${arena.locations[0]} • ${arena.time}</p>
                        </div>
                    </div>
                `;
            });
            
            html += `</div>`;
            content.innerHTML = html;
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.buttons button').forEach(b => b.classList.remove('active'));
            
            if (view === 'list') {
                document.getElementById('btnList').classList.add('active');
                renderArenasList();
                renderArenaDetails();
            } else if (view === 'films') {
                document.getElementById('btnFilms').classList.add('active');
                renderFilmsView();
            } else if (view === 'map') {
                document.getElementById('btnMap').classList.add('active');
                const content = document.getElementById('contentArea');
                content.innerHTML = '<div id="mapId" class="map-container"></div>';
                setTimeout(() => initMap(), 100);
            }
            
            toggleSidebar();
        }

        function initMap() {
            const mapId = document.getElementById('mapId');
            if (!map) {
                map = L.map(mapId).setView([41.9028, 12.4964], 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19,
                }).addTo(map);
                
                arenas.forEach((arena, idx) => {
                    L.circleMarker([arena.coords.lat, arena.coords.lng], {
                        radius: 8,
                        fillColor: '#ef4444',
                        color: '#fff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).bindPopup(`<strong>${idx + 1}. ${arena.name}</strong><br>${arena.locations[0]}`)
                     .on('click', () => selectArena(arena.id))
                     .addTo(map);
                });
            }
            map.invalidateSize();
        }

        document.getElementById('dateInput').addEventListener('change', () => {
            renderArenasList();
            if (currentView === 'list') renderArenaDetails();
            if (currentView === 'films') renderFilmsView();
        });

        document.getElementById('searchInput').addEventListener('input', renderArenasList);

        renderArenasList();
    </script>
</body>
</html>
